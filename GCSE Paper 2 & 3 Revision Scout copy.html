let currentSessionQuestions = [];
        let currentIndex = 0;
        let topicStats = {}; // Object to track total and correct answers per topic

        function startSession(starRating) {
            currentSessionQuestions = questions.filter(q => q.stars === starRating);
            if (currentSessionQuestions.length === 0) {
                alert("No questions added for this priority level yet!");
                return;
            }
            
            // Initialize stats for the session
            topicStats = {};
            currentSessionQuestions.forEach(q => {
                if (!topicStats[q.topic]) {
                    topicStats[q.topic] = { total: 0, correct: 0 };
                }
                topicStats[q.topic].total++;
            });

            currentIndex = 0;
            
            document.getElementById('main-menu').classList.add('hidden-section');
            document.getElementById('question-container').classList.remove('hidden-section');
            loadQuestion();
        }

        async function loadQuestion() {
    const q = currentSessionQuestions[currentIndex];
    
    // Reset UI
    document.getElementById('worked-solution').classList.remove('show');
    document.getElementById('assessment-btns').classList.add('hidden');
    document.getElementById('reveal-btn').classList.remove('hidden');
    
    // Populate Content
    document.getElementById('progress-text').innerText = `Question ${currentIndex + 1} of ${currentSessionQuestions.length}`;
    document.getElementById('q-topic').innerText = q.topic;
    document.getElementById('q-text').innerHTML = q.text;
    document.getElementById('solution-content').innerHTML = q.solution;

    // --- NEW INLINE SVG LOGIC ---
    const svgContainer = document.getElementById('q-svg-container');
    
    if (q.svg) {
        svgContainer.innerHTML = q.svg;
        svgContainer.classList.remove('hidden');
    } else {
        svgContainer.innerHTML = '';
        svgContainer.classList.add('hidden');
    }
    // ----------------------------

    // Trigger MathJax typeset for the new content
    if (window.MathJax && window.MathJax.typesetPromise) {
        await MathJax.typesetPromise();
    }
}

        function toggleSolution() {
            document.getElementById('worked-solution').classList.add('show');
            document.getElementById('reveal-btn').classList.add('hidden');
            document.getElementById('assessment-btns').classList.remove('hidden');
            
            // Re-render solution math if any
            if (window.MathJax && window.MathJax.typesetPromise) {
                MathJax.typesetPromise();
            }
        }

        function recordResult(isCorrect) {
            const currentTopic = currentSessionQuestions[currentIndex].topic;
            
            if (isCorrect) {
                topicStats[currentTopic].correct++;
            }

            if (currentIndex < currentSessionQuestions.length - 1) {
                currentIndex++;
                loadQuestion();
            } else {
                showSummary();
            }
        }

        function showSummary() {
            document.getElementById('question-container').classList.add('hidden-section');
            document.getElementById('summary-container').classList.remove('hidden-section');
            
            const listEl = document.getElementById('revision-list');
            listEl.innerHTML = '';

            let perfectScore = true;

            for (const [topic, stats] of Object.entries(topicStats)) {
                // If they didn't get 100% on this topic, add it to the revision list
                if (stats.correct < stats.total) {
                    perfectScore = false;
                    
                    const percentCorrect = Math.round((stats.correct / stats.total) * 100);
                    
                    // Determine priority color based on percentage
                    let barColor = 'bg-red-500'; // High priority (0-33%)
                    let priorityText = 'High Priority Revision';
                    let textClass = 'text-red-600';
                    
                    if (percentCorrect > 66) {
                        barColor = 'bg-emerald-400'; // Low priority (67-99%)
                        priorityText = 'Review Recommended';
                        textClass = 'text-emerald-600';
                    } else if (percentCorrect > 33) {
                        barColor = 'bg-amber-400'; // Medium priority (34-66%)
                        priorityText = 'Medium Priority Revision';
                        textClass = 'text-amber-600';
                    }

                    // Ensure minimum width of 2% so "0%" red bars are still slightly visible
                    const displayWidth = percentCorrect === 0 ? 2 : percentCorrect;

                    const div = document.createElement('div');
                    div.className = "flex flex-col p-5 bg-white border border-slate-200 rounded-xl shadow-sm";
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-3">
                            <div>
                                <p class="font-bold text-slate-800 text-lg">${topic}</p>
                                <p class="text-xs text-slate-500 mt-1">Search for this topic on CorbettMaths or Sparx</p>
                            </div>
                            <div class="text-right">
                                <span class="text-sm font-bold text-slate-700">${stats.correct} / ${stats.total} correct</span>
                            </div>
                        </div>
                        
                        <div class="w-full bg-slate-100 rounded-full h-3 mb-2 overflow-hidden border border-slate-200">
                            <div class="${barColor} h-full rounded-full transition-all duration-1000" style="width: ${displayWidth}%"></div>
                        </div>
                        
                        <div class="flex justify-between items-center">
                            <span class="text-xs font-bold ${textClass} uppercase tracking-wider">${priorityText}</span>
                            <span class="text-xs font-semibold text-slate-500">${percentCorrect}% Mastery</span>
                        </div>
                    `;
                    listEl.appendChild(div);
                }
            }

            if (perfectScore) {
                listEl.innerHTML = `
                    <div class="bg-emerald-50 p-6 rounded-xl border border-emerald-100 text-center shadow-sm">
                        <div class="text-emerald-500 mb-2 flex justify-center">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>
                        <p class="text-emerald-800 font-bold text-lg">Great work!</p>
                        <p class="text-emerald-600 text-sm mt-1">You nailed all the topics in this set.</p>
                    </div>
                `;
            }
        }

        function showMenu() {
            document.getElementById('question-container').classList.add('hidden-section');
            document.getElementById('summary-container').classList.add('hidden-section');
            document.getElementById('main-menu').classList.remove('hidden-section');
        }

        // Listen for keyboard shortcuts (Spacebar to reveal, 1 and 2 to self-assess)
        document.addEventListener('keydown', function(event) {
            const questionContainer = document.getElementById('question-container');
            
            if (!questionContainer.classList.contains('hidden-section')) {
                const revealBtn = document.getElementById('reveal-btn');
                const assessmentBtns = document.getElementById('assessment-btns');
                
                if (event.code === 'Space' && !revealBtn.classList.contains('hidden')) {
                    event.preventDefault();
                    toggleSolution();
                    return;
                }
                
                if (!assessmentBtns.classList.contains('hidden')) {
                    if (event.key === '1') {
                        recordResult(false);
                    } else if (event.key === '2') {
                        recordResult(true);
                    }
                }
            }
        });
    </script>
